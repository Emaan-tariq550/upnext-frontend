<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPNEXT — Offline</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #050507;
        color: #f4f4f5;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 24px;
      }
      h1 { color: #a78bfa; font-size: 1.5rem; margin-bottom: 8px; }
      p { color: #8b8b96; max-width: 320px; }
      button {
        margin-top: 24px;
        background: #a78bfa;
        color: #000;
        border: none;
        padding: 12px 24px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>You're offline</h1>
    <p>UPNEXT needs a connection to fetch fame, followers, and events. Reconnect and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </body>
</html>
